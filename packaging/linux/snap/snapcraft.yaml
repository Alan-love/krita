---
name: krita
grade: stable
adopt-info: krita
base: core24
confinement: strict
apps:
  krita:
    common-id: org.kde.krita
    desktop: usr/share/applications/org.kde.krita.desktop
    command: usr/bin/krita
    extensions:
      - kde-neon-6
    plugs:
      - home
      - removable-media
      - cups
    environment:
      LD_LIBRARY_PATH: $SNAP/ffmpeg-platform/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:${LD_LIBRARY_PATH}
      PATH: $SNAP/ffmpeg-platform/usr/bin:${PATH}
plugs:
  ffmpeg-2404:
    interface: content
    target: ffmpeg-platform # the folder where this content snap will be mounted
    default-provider: ffmpeg-2404
slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.krita
    bus: session
parts:
  kdcraw:
    source: https://invent.kde.org/graphics/libkdcraw.git
    source-branch: release/25.12
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
    build-packages:
      - cmake
      - libraw-dev
      - libx11-dev
      - pkg-config
  krita:
    after:
      - kdcraw
    source: .
    source-type: local
    plugin: cmake
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_TESTING=OFF
      - -DBUILD_TESTING=OFF
      - -DKDE_SKIP_TEST_SETTINGS=ON
      - -DBUILD_KRITA_QT_DESIGNER_PLUGINS=OFF
    build-packages:
      - cmake
      - gettext
      - libkseexpr-dev
      - libboost-system-dev
      - libcurl4-gnutls-dev
      - libeigen3-dev
      - libexiv2-dev
      - libfftw3-dev
      - libgif-dev
      - libgsl-dev
      - libheif-dev
      - libimmer-dev
      - libjpeg-dev
      - liblager-dev
      - liblcms2-dev
      - libmypaint-dev
      - libopencolorio-dev
      - libopenexr-dev
      - libopenjp2-7-dev
      - libpng-dev
      - libpostproc-dev
      - libquazip5-dev
      - libraw-dev
      - libraqm-dev
      - libtiff-dev
      - libturbojpeg0-dev
      - libunibreak-dev
      - libwebp-dev
      - libxcb-util0-dev
      - libxcb1-dev
      - libxi-dev
      - libxsimd-dev
      - libzug-dev
      - pkg-config
      - python3-sip-dev
      - vc-dev
      - xtl-dev
      - zlib1g-dev
      - libmlt-dev
      - libmlt++-dev
      - libsdl2-dev
      - libfribidi-dev
      - libfreetype6-dev
    build-snaps:
      - ffmpeg-2404-sdk
      - kde-qt6-core24-sdk/latest/stable
      - kde-pyside6-core24-sdk/latest/stable
    parse-info:
      - usr/share/metainfo/org.kde.krita.appdata.xml
    stage-packages:
      - libexiv2-27
      - libfftw3-double3
      - libfontconfig1
      - libfreetype6
      - libgcc-s1
      - libgif7
      - libgsl27
      - libheif1
      - libjpeg-turbo8
      - libkseexpr4
      - libkseexprui4
      - liblcms2-2
      - libmypaint-1.5-1
      - libopencolorio2.1t64
      - libopenexr-3-1-30
      - libopenjp2-7
      - libpng16-16
      - libpython3.12
      - libquazip5-1
      - libtiff6
      - libturbojpeg
      - libunibreak5
      - libwebp7
      - libwebpdemux2
      - libwebpmux3
      - libx11-6
      - zlib1g
      - colord
      - colord-data
      - libmlt7
      - libsdl2-2.0-0
      - libmlt++7
      - libimath-3-1-29
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/doc/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
  gpu-2404:
    after: [krita]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - krita
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
        cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done
